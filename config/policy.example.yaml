# ghbrk policy.example.yaml
#
# Rules are evaluated in document order; the first match wins.
# If no rule matches, the request is denied (default-deny).
#
# Fields per rule:
#   user       - OS username of the calling process, or "*" for any user
#   org        - GitHub organisation (or username for personal repos)
#   repo       - Repository name
#   operations - List of operations this rule covers, or a role name (string)
#   branches   - Optional list of branch globs (default: ["*"])
#   effect     - "allow" or "deny"
#
# Available operations:
#   push, fetch, pull, clone
#   pr_open, pr_comment, pr_close, pr_merge, pr_review
#   issue_open, issue_comment, issue_close
#   release_create, release_delete, release_edit, release_upload,
#   release_delete_asset, release_list, release_view, release_download
#   gh_api_read  (GET-only GitHub REST API calls via `gh api`)
#
# Built-in roles (always available, can be overridden in the roles: section):
#   read-only  - fetch, clone, pull, pr_review, gh_api_read, release_list,
#                release_view, release_download
#   write      - read-only + push, pr_open, pr_comment, pr_close, pr_merge,
#                issue_open, issue_comment, issue_close
#   maintain   - write + release_create, release_delete, release_edit,
#                release_upload, release_delete_asset
#   admin      - maintain (structurally identical for now; reserved for
#                future admin-only operations)
#
# User-defined roles (declared in the optional roles: section below) shadow
# built-in roles of the same name. A role name used in operations: is resolved
# at evaluation time, so editing a role definition fans out to every rule that
# references it.

# ─────────────────────────────────────────────────────────────────────────────
# Optional roles: section — define or override named operation sets.
# Built-in roles (read-only, write, maintain, admin) are always available and can be
# referenced in any rule without declaring them here.  Declare a role here to
# override a built-in or to introduce a completely new role.
# ─────────────────────────────────────────────────────────────────────────────
# roles:
#   # User-defined role: grants only the operations needed for deployments.
#   deploy:
#     - push
#     - release_create
#
#   # Override the built-in "write" role to remove pr_merge for this install.
#   write:
#     - push
#     - fetch
#     - pull
#     - clone
#     - pr_open
#     - pr_comment
#     - pr_close
#     - pr_review
#     - issue_open
#     - issue_comment
#     - issue_close
#     - gh_api_read

rules:
  # -------------------------------------------------------------------------
  # Role-referencing rules — use a role name instead of an inline list.
  # -------------------------------------------------------------------------
  # Grant the built-in "write" role to bob on all acme repos.
  # - user: bob
  #   org: acme
  #   repo: "*"
  #   operations: write
  #   effect: allow

  # Grant a custom "deploy" role to alice on the web repo (main only).
  # - user: alice
  #   org: acme
  #   repo: web
  #   branches: [main]
  #   operations: deploy
  #   effect: allow

  # -------------------------------------------------------------------------
  # Explicit deny: nobody may force-push to the protected release branches.
  # This rule runs before any allow rule so it takes precedence (first-match).
  # -------------------------------------------------------------------------
  - user: "*"
    org: acme
    repo: platform
    operations:
      - push
    branches:
      - "release/*"
      - main
    effect: deny

  # -------------------------------------------------------------------------
  # Named developer — full access to a specific repo on feature branches.
  # -------------------------------------------------------------------------
  - user: alice
    org: acme
    repo: platform
    operations:
      - push
      - fetch
      - clone
    branches:
      - "feature/*"
      - develop
    effect: allow

  # -------------------------------------------------------------------------
  # Named developer — PR and issue lifecycle on the same repo.
  # -------------------------------------------------------------------------
  - user: alice
    org: acme
    repo: platform
    operations:
      - pr_open
      - pr_comment
      - pr_close
      - pr_merge
      - pr_review
      - issue_open
      - issue_comment
      - issue_close
    effect: allow

  # -------------------------------------------------------------------------
  # Release manager — may create releases in addition to normal git ops.
  # -------------------------------------------------------------------------
  - user: release-bot
    org: acme
    repo: platform
    operations:
      - push
      - fetch
      - clone
      - release_create
    branches:
      - "release/*"
      - main
    effect: allow

  # -------------------------------------------------------------------------
  # Wildcard user rule — everyone may fetch/clone public repos read-only.
  # -------------------------------------------------------------------------
  - user: "*"
    org: acme
    repo: "*"
    operations:
      - fetch
      - clone
    effect: allow

  # -------------------------------------------------------------------------
  # Allow pull without allowing fetch — useful when agents should be able to
  # update their working tree but not explicitly fetch remote branches.
  # -------------------------------------------------------------------------
  # - user: agent-user
  #   org: acme
  #   repo: platform
  #   operations:
  #     - pull
  #   effect: allow
